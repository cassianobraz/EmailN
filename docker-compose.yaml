services:
  postgres:
    image: postgres:17
    container_name: emailn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: emailn_dev
      POSTGRES_PASSWORD: "d4#rt6"
      POSTGRES_DB: emailn_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
